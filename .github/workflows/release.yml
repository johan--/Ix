name: Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggered by pushing a version tag:    git tag v0.3.0 && git push origin v0.3.0
#
# What it does (in order):
#   1. Builds the Scala Memory Layer JAR (sbt assembly)
#   2. Builds + pushes Docker image to ghcr.io
#   3. Builds the TypeScript CLI
#   4. Packages CLI tarballs for linux, macOS (amd64+arm64), Windows
#   5. Creates a GitHub Release with all assets + install instructions
#   6. Updates the Homebrew formula with the new SHA and commits it
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.4.9)"
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ix-memory-layer

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Need full history + write access for the Homebrew formula commit
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 1. Build Memory Layer JAR ───────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "sbt"

      - name: Set up sbt
        uses: sbt/setup-sbt@dd1ef7d7798fab5ce802a6adab3b782817b8c2d0 # v1.1.20

      - name: Build JAR
        run: sbt "memoryLayer/assembly"

      # ── 2. Build + Push Docker Image ────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and push Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./memory-layer
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      # ── 3. Build CLI ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.14"
          cache: "npm"
          cache-dependency-path: ix-cli/package-lock.json

      - name: Build core-ingestion
        working-directory: core-ingestion
        run: npm ci --silent

      - name: Build CLI
        working-directory: ix-cli
        run: |
          npm ci --silent
          npm run build
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      # ── 3b. Build System Compass (optional — needs COMPASS_TOKEN secret) ─
      - name: Build System Compass
        continue-on-error: true
        env:
          COMPASS_TOKEN: ${{ secrets.COMPASS_TOKEN }}
        run: |
          if [ -z "$COMPASS_TOKEN" ]; then
            echo "COMPASS_TOKEN not set — skipping compass build"
            exit 0
          fi
          git clone https://x-access-token:${COMPASS_TOKEN}@github.com/ix-infrastructure/system-compass.git
          cd system-compass
          npm ci --legacy-peer-deps
          npm run build
          # Verify the build produced output
          if [ ! -f dist/index.html ]; then
            echo "::error::Compass build did not produce dist/index.html"
            exit 1
          fi

      # ── 4. Package CLI tarballs ─────────────────────────────────────────
      - name: Package CLI (linux-amd64)
        run: |
          STAGING="ix-${{ steps.version.outputs.version }}-linux-amd64"
          mkdir -p "$STAGING/cli" "$STAGING/core-ingestion" "$STAGING/compass"
          cp -r ix-cli/dist ix-cli/node_modules ix-cli/package.json "$STAGING/cli/"
          cp -r core-ingestion/dist core-ingestion/node_modules core-ingestion/package.json "$STAGING/core-ingestion/"
          [ -d system-compass/dist ] && cp -r system-compass/dist/* "$STAGING/compass/" || true
          cat > "$STAGING/ix" <<'WRAPPER'
          #!/bin/sh
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          exec node "$SCRIPT_DIR/cli/dist/cli/main.js" "$@"
          WRAPPER
          chmod +x "$STAGING/ix"
          tar -czf "$STAGING.tar.gz" "$STAGING"
          shasum -a 256 "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"

      - name: Package CLI (darwin-amd64)
        run: |
          STAGING="ix-${{ steps.version.outputs.version }}-darwin-amd64"
          mkdir -p "$STAGING/cli" "$STAGING/core-ingestion" "$STAGING/compass"
          cp -r ix-cli/dist ix-cli/node_modules ix-cli/package.json "$STAGING/cli/"
          cp -r core-ingestion/dist core-ingestion/node_modules core-ingestion/package.json "$STAGING/core-ingestion/"
          [ -d system-compass/dist ] && cp -r system-compass/dist/* "$STAGING/compass/" || true
          cat > "$STAGING/ix" <<'WRAPPER'
          #!/bin/sh
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          exec node "$SCRIPT_DIR/cli/dist/cli/main.js" "$@"
          WRAPPER
          chmod +x "$STAGING/ix"
          tar -czf "$STAGING.tar.gz" "$STAGING"
          shasum -a 256 "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"

      - name: Package CLI (darwin-arm64)
        run: |
          STAGING="ix-${{ steps.version.outputs.version }}-darwin-arm64"
          mkdir -p "$STAGING/cli" "$STAGING/core-ingestion" "$STAGING/compass"
          cp -r ix-cli/dist ix-cli/node_modules ix-cli/package.json "$STAGING/cli/"
          cp -r core-ingestion/dist core-ingestion/node_modules core-ingestion/package.json "$STAGING/core-ingestion/"
          [ -d system-compass/dist ] && cp -r system-compass/dist/* "$STAGING/compass/" || true
          cat > "$STAGING/ix" <<'WRAPPER'
          #!/bin/sh
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          exec node "$SCRIPT_DIR/cli/dist/cli/main.js" "$@"
          WRAPPER
          chmod +x "$STAGING/ix"
          tar -czf "$STAGING.tar.gz" "$STAGING"
          shasum -a 256 "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"

      - name: Package CLI (windows-amd64)
        run: |
          STAGING="ix-${{ steps.version.outputs.version }}-windows-amd64"
          mkdir -p "$STAGING/cli" "$STAGING/core-ingestion" "$STAGING/compass"
          cp -r ix-cli/dist ix-cli/node_modules ix-cli/package.json "$STAGING/cli/"
          cp -r core-ingestion/dist core-ingestion/node_modules core-ingestion/package.json "$STAGING/core-ingestion/"
          [ -d system-compass/dist ] && cp -r system-compass/dist/* "$STAGING/compass/" || true
          cat > "$STAGING/ix.cmd" <<'WRAPPER'
          @echo off
          node "%~dp0cli\dist\cli\main.js" %*
          WRAPPER
          zip -r "$STAGING.zip" "$STAGING"
          shasum -a 256 "$STAGING.zip" > "$STAGING.zip.sha256"

      # ── 5. Create GitHub Release ────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Install

            ### Quick install (no repo needed)
            ```bash
            # macOS / Linux
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install/install.sh | bash

            # Windows (PowerShell)
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install/install.ps1 | iex

            # Homebrew
            brew tap ${{ github.repository_owner }}/ix https://github.com/${{ github.repository }}
            brew install ix
            ix docker start
            ```

            ### Docker image
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```
          files: |
            ix-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            ix-${{ steps.version.outputs.version }}-linux-amd64.tar.gz.sha256
            ix-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz
            ix-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz.sha256
            ix-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz
            ix-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz.sha256
            ix-${{ steps.version.outputs.version }}-windows-amd64.zip
            ix-${{ steps.version.outputs.version }}-windows-amd64.zip.sha256

      # ── 6. Update Homebrew formula via PR ──────────────────────────────
      - name: Update Homebrew formula
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)

          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" homebrew/ix.rb
          sed -i "s|# sha256 .*|sha256 \"${SHA256}\"|; s|sha256 \".*\"|sha256 \"${SHA256}\"|" homebrew/ix.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/brew-update-v${VERSION}"
          git checkout -b "$BRANCH"
          git add homebrew/ix.rb
          git commit -m "brew: update formula for v${VERSION}" || exit 0
          git push origin "$BRANCH"
          gh pr create --title "brew: update formula for v${VERSION}" --body "Auto-generated: updates Homebrew formula SHA for v${VERSION}" --base main
